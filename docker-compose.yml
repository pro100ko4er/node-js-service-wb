version: "3.9"

services:
  app:
    build: .
    container_name: node_app
    ports:
      - "${APP_PORT}:3000"
    depends_on:
      - db
    env_file:
      - .env
    command: npm run start

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: